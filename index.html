<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KeySafe</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #6c63ff;
    --accent2: #4ecca3;
    --text: #f0f0f5;
    --muted: #8888a0;
    --danger: #ff5c5c;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; max-width: 480px;
    margin: 0 auto; overflow-x: hidden;
  }

  /* ═══ SCREENS ═══ */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ═══════════════ LOGIN SCREEN ═══════════════ */
  #loginScreen.active {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 28px;
  }
  .login-glow {
    position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(108,99,255,0.2) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .login-logo {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; margin-bottom: 18px;
    box-shadow: 0 0 40px rgba(108,99,255,0.28);
    position: relative; z-index: 1;
  }
  .login-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; z-index:1; }
  .login-sub   { font-size: 14px; color: var(--muted); margin-bottom: 38px; text-align: center; z-index:1; }

  .login-card {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 26px 22px;
    width: 100%; z-index: 1;
  }
  .tabs {
    display: flex; background: var(--surface2);
    border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 22px;
  }
  .tab {
    flex: 1; text-align: center; padding: 9px;
    border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; color: var(--muted);
    border: none; background: none; transition: all 0.2s;
  }
  .tab.active { background: var(--accent); color: white; }

  .field { margin-bottom: 17px; }
  .field-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.9px; color: var(--muted); margin-bottom: 8px; display: block;
  }
  .field-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; padding: 13px 14px; outline: none;
    transition: border-color 0.2s;
  }
  .field-input:focus { border-color: var(--accent); }

  /* 4-digit PIN */
  .pin-row { display: flex; gap: 10px; justify-content: center; }
  .pin-box {
    width: 58px; height: 64px;
    background: var(--surface2); border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm); font-size: 28px; font-weight: 700;
    text-align: center; color: var(--text); outline: none;
    caret-color: var(--accent); transition: border-color 0.2s;
    -webkit-text-security: disc; font-family: monospace;
  }
  .pin-box:focus { border-color: var(--accent); }

  .auth-btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none; border-radius: var(--radius-sm);
    color: white; font-size: 16px; font-weight: 700;
    padding: 15px; cursor: pointer; margin-top: 6px;
    letter-spacing: 0.2px; transition: opacity 0.2s;
  }
  .auth-btn:active { opacity: 0.85; }
  .auth-error {
    text-align: center; color: var(--danger);
    font-size: 13px; margin-top: 11px; min-height: 18px;
  }
  .auth-hint {
    text-align: center; color: var(--muted);
    font-size: 12px; margin-top: 14px; line-height: 1.6;
  }

  /* ═══════════════ APP SCREEN ═══════════════ */
  /* HEADER */
  .header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 18px 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px;
  }
  .app-logo { display: flex; align-items: center; gap: 9px; }
  .app-logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .app-logo-name { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .sync-badge { display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .sync-dot.ok { background: var(--accent2); }
  .sync-dot.busy { background: #f5a623; animation: blink 1s infinite; }
  .sync-txt { font-size: 11px; color: var(--muted); }
  .logout-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--muted);
    font-size: 12px; font-weight: 600;
    padding: 6px 11px; cursor: pointer;
  }
  .logout-btn:active { color: var(--danger); border-color: var(--danger); }

  /* BULK BOX */
  .bulk-box {
    margin: 13px 16px 0;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 13px 15px;
  }
  .bulk-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.9px; color: var(--muted); margin-bottom: 9px;
  }
  .bulk-row { display: flex; gap: 8px; align-items: center; }
  .pw-wrap { position: relative; flex: 1; }
  .pw-wrap input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); font-size: 14px;
    padding: 10px 38px 10px 12px; outline: none;
    font-family: 'Courier New', monospace; letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .pw-wrap input:focus { border-color: var(--accent); }
  .eye-btn {
    position: absolute; right: 9px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px;
  }
  .apply-btn {
    background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none; border-radius: var(--radius-sm);
    color: white; font-size: 13px; font-weight: 700;
    padding: 10px 15px; cursor: pointer; white-space: nowrap;
  }
  .apply-btn:active { opacity: 0.8; }
  .bulk-info { font-size: 12px; color: var(--accent2); margin-top: 7px; min-height: 16px; }

  /* LIST */
  .list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 18px 8px;
  }
  .list-title {
    font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.9px; color: var(--muted);
  }
  .add-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--accent2);
    font-size: 13px; font-weight: 700;
    padding: 7px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
  }
  .add-btn:active { opacity: 0.7; }

  .items-list {
    padding: 0 14px 60px;
    display: flex; flex-direction: column; gap: 9px;
  }

  /* ITEM CARD */
  .item-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 14px;
    display: flex; align-items: center; gap: 12px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
  }
  .item-card.selected { border-color: var(--accent); background: rgba(108,99,255,0.07); }
  .item-card.updated::after {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent2);
  }
  .item-cb {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border2); background: transparent;
    appearance: none; -webkit-appearance: none;
    cursor: pointer; flex-shrink: 0; transition: all 0.15s; position: relative;
  }
  .item-cb:checked { background: var(--accent); border-color: var(--accent); }
  .item-cb:checked::after {
    content: '✓'; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%); color: white; font-size: 12px; font-weight: 800;
  }
  .item-icon {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 15px; font-weight: 600; margin-bottom: 3px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-user {
    font-size: 12px; color: var(--muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .item-actions { display: flex; gap: 5px; flex-shrink: 0; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; width: 33px; height: 33px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; color: var(--muted);
  }
  .icon-btn:active { background: var(--border2); }

  /* ═══ REVEAL PANEL ═══ */
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.58);
    z-index: 290; display: none;
  }
  .sheet-overlay.show { display: block; }
  .reveal-sheet {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border2);
    border-radius: 20px 20px 0 0;
    padding: 10px 22px 40px; z-index: 300; display: none;
  }
  .reveal-sheet.show { display: block; animation: slideUp 0.22s ease; }
  .sheet-drag { width: 38px; height: 4px; background: var(--border2); border-radius: 2px; margin: 8px auto 18px; }
  .reveal-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--muted); margin-bottom: 4px; }
  .reveal-name { font-size: 20px; font-weight: 800; margin-bottom: 16px; }
  .reveal-user-row { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .reveal-pw-box {
    background: var(--surface2); border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 15px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; margin-bottom: 18px;
  }
  .reveal-pw-val {
    font-family: 'Courier New', monospace; font-size: 20px; font-weight: 700;
    letter-spacing: 3px; color: var(--text); word-break: break-all; flex: 1;
  }
  .reveal-eye {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 20px; flex-shrink: 0;
  }
  .reveal-btns { display: flex; gap: 10px; }
  .reveal-close {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; padding: 14px 20px; cursor: pointer;
  }
  .reveal-copy {
    flex: 1; background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none; border-radius: var(--radius-sm); color: white;
    font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer;
  }
  .reveal-copy:active { opacity: 0.85; }

  /* ═══ ADD/EDIT MODAL ═══ */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 200; display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 10px 20px 42px; width: 100%; max-width: 480px;
    animation: slideUp 0.24s ease;
  }
  .modal-drag { width: 38px; height: 4px; background: var(--border2); border-radius: 2px; margin: 8px auto 18px; }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--muted); margin-bottom: 7px; display: block;
  }
  .modal-input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
    color: var(--text); font-size: 15px; padding: 12px 14px; outline: none;
    transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-pw-wrap { position: relative; }
  .modal-pw-wrap .modal-input { padding-right: 44px; }
  .modal-eye {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px;
  }
  .emoji-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 6px; margin-top: 8px; }
  .emoji-opt {
    background: var(--surface2); border: 1.5px solid transparent;
    border-radius: 8px; padding: 6px; font-size: 20px;
    cursor: pointer; text-align: center; transition: all 0.1s;
  }
  .emoji-opt.picked { border-color: var(--accent); background: rgba(108,99,255,0.18); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary {
    flex: 1; background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none; border-radius: var(--radius-sm);
    color: white; font-size: 15px; font-weight: 700; padding: 14px; cursor: pointer;
  }
  .btn-cancel {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; padding: 14px 20px; cursor: pointer;
  }

  /* MISC */
  .toast {
    position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 50px; padding: 11px 24px; font-size: 14px; font-weight: 500;
    z-index: 500; opacity: 0; transition: opacity 0.3s;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.ok  { border-color: var(--accent2); color: var(--accent2); }
  .toast.err { border-color: var(--danger);  color: var(--danger); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }
  .empty-icon  { font-size: 44px; margin-bottom: 14px; }
  .spinner-wrap { text-align: center; padding: 50px; color: var(--muted); font-size: 13px; }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border2);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes slideUp { from { transform: translateY(44px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes spin    { to { transform: rotate(360deg); } }
  @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-glow"></div>
  <div class="login-logo">🔑</div>
  <div class="login-title">KeySafe</div>
  <div class="login-sub">Your personal password vault</div>

  <div class="login-card">
    <div class="tabs">
      <button class="tab active" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab"        id="tabSetup"  onclick="switchTab('setup')">First Time Setup</button>
    </div>

    <!-- SIGN IN -->
    <div id="panelSignin">
      <div class="field">
        <label class="field-label">Username</label>
        <input class="field-input" id="liUser" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label class="field-label">4-Digit PIN</label>
        <div class="pin-row">
          <input class="pin-box" id="lp0" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="lp1" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="lp2" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="lp3" maxlength="1" inputmode="numeric">
        </div>
      </div>
      <button class="auth-btn" onclick="doLogin()">🔓 Unlock Vault</button>
      <div class="auth-error" id="loginErr"></div>
    </div>

    <!-- FIRST TIME SETUP -->
    <div id="panelSetup" style="display:none">
      <div class="field">
        <label class="field-label">Choose a Username</label>
        <input class="field-input" id="suUser" placeholder="e.g. Karthik" maxlength="30" autocomplete="off">
      </div>
      <div class="field">
        <label class="field-label">Choose a 4-Digit PIN</label>
        <div class="pin-row">
          <input class="pin-box" id="sp0" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="sp1" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="sp2" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="sp3" maxlength="1" inputmode="numeric">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Confirm PIN</label>
        <div class="pin-row">
          <input class="pin-box" id="cp0" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="cp1" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="cp2" maxlength="1" inputmode="numeric">
          <input class="pin-box" id="cp3" maxlength="1" inputmode="numeric">
        </div>
      </div>
      <button class="auth-btn" onclick="doSetup()">✅ Create Vault</button>
      <div class="auth-error" id="setupErr"></div>
    </div>

    <div class="auth-hint" id="authHint">First time? Switch to <b>First Time Setup</b></div>
  </div>
</div>

<!-- ═══════════════ APP SCREEN ═══════════════ -->
<div id="appScreen" class="screen">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="app-logo">
        <div class="app-logo-icon">🔑</div>
        <div class="app-logo-name">KeySafe</div>
      </div>
      <div class="header-right">
        <div class="sync-badge">
          <div class="sync-dot" id="syncDot"></div>
          <span class="sync-txt" id="syncTxt">–</span>
        </div>
        <button class="logout-btn" onclick="doLogout()">👤 <span id="hdrUser"></span> &nbsp;✕</button>
      </div>
    </div>

    <!-- BULK PASSWORD UPDATE -->
    <div class="bulk-box">
      <div class="bulk-label">⚡ Bulk Update Password</div>
      <div class="bulk-row">
        <div class="pw-wrap">
          <input type="password" id="bulkPw" placeholder="New password for selected accounts…">
          <button class="eye-btn" onclick="toggleEye('bulkPw')">👁</button>
        </div>
        <button class="apply-btn" onclick="applyBulk()">Apply</button>
      </div>
      <div class="bulk-info" id="bulkInfo">Select accounts below to update their passwords</div>
    </div>
  </div>

  <!-- ACCOUNT LIST -->
  <div class="list-header">
    <div class="list-title">My Accounts</div>
    <button class="add-btn" onclick="openAdd()">＋ Add</button>
  </div>
  <div class="items-list" id="itemsList">
    <div class="spinner-wrap"><div class="spinner"></div>Loading…</div>
  </div>
</div>

<!-- ═══ REVEAL PASSWORD SHEET ═══ -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeReveal()"></div>
<div class="reveal-sheet" id="revealSheet">
  <div class="sheet-drag"></div>
  <div class="reveal-label">Password for</div>
  <div class="reveal-name"  id="rvName"></div>
  <div class="reveal-user-row" id="rvUser"></div>
  <div class="reveal-pw-box">
    <div class="reveal-pw-val" id="rvPw"></div>
    <button class="reveal-eye" id="rvEyeBtn" onclick="toggleRevealEye()">👁</button>
  </div>
  <div class="reveal-btns">
    <button class="reveal-close" onclick="closeReveal()">Close</button>
    <button class="reveal-copy"  onclick="copyReveal()">📋 Copy Password</button>
  </div>
</div>

<!-- ═══ ADD / EDIT MODAL ═══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modalTitle">Add Account</div>
    <div class="modal-field">
      <label class="modal-label">Account Name</label>
      <input class="modal-input" id="mName" placeholder="e.g. Netflix, PayPal…" maxlength="40">
    </div>
    <div class="modal-field">
      <label class="modal-label">Username / Email (optional)</label>
      <input class="modal-input" id="mUser" placeholder="user@example.com" maxlength="80">
    </div>
    <div class="modal-field">
      <label class="modal-label">Password</label>
      <div class="modal-pw-wrap">
        <input class="modal-input" type="password" id="mPw" placeholder="••••••••">
        <button class="modal-eye" onclick="toggleEye('mPw')">👁</button>
      </div>
    </div>
    <div class="modal-field">
      <label class="modal-label">Icon</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel"  onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══ FIREBASE ═══ -->
<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         onSnapshot, serverTimestamp, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ── INIT ── */
const db = getFirestore(initializeApp({
  apiKey: "AIzaSyBvLGTneootuelux40br6nCgg1CcVv62D0",
  authDomain: "passwordmanager-6a959.firebaseapp.com",
  projectId: "passwordmanager-6a959",
  storageBucket: "passwordmanager-6a959.firebasestorage.app",
  messagingSenderId: "425338178784",
  appId: "1:425338178784:web:d125407f1776fe75935485"
}));

/* ── CONSTANTS ── */
const EMOJIS   = ["🔐","📧","🏦","🛒","🎮","💼","🏥","🎵","📱","🌐","💳","🔑","📷","🏠","✈️","🎓","🍎","🐦","💬","📺","🔒","⚡","🛡️","🎯","💡","🎁","🏋️","🎬","🚆","🔔","📌","🌟","💰"];
const ICON_BG  = {"📧":"#14222e","🏦":"#0e1e18","💳":"#131323","🚆":"#101e10","🔐":"#1e1226","🎮":"#1e100e","💼":"#1e1c0e","🌐":"#0e1e1e"};
const DEFAULTS = [
  {name:"Gmail",          username:"", password:"", icon:"📧"},
  {name:"SBI Net Banking",username:"", password:"", icon:"🏦"},
  {name:"HDFC Bank",      username:"", password:"", icon:"💳"},
  {name:"IRCTC",          username:"", password:"", icon:"🚆"},
];

/* ── STATE ── */
let user       = null;   // { id, name }
let items      = [];
let editId     = null;
let selEmoji   = "🔐";
let revealItem = null;
let pwVisible  = false;
let unsub      = null;

/* ── DOM ── */
const $    = id => document.getElementById(id);
const esc  = s  => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const pin  = (p) => [0,1,2,3].map(i=>$(p+i).value).join("");
const clrP = (p) => [0,1,2,3].forEach(i=>{ $(p+i).value=""; });

/* ── SYNC STATUS ── */
function sync(state){
  const d=$("syncDot"), t=$("syncTxt");
  if(state==="ok")  { d.className="sync-dot ok";   t.textContent="Synced"; }
  else if(state==="busy"){ d.className="sync-dot busy"; t.textContent="Saving…"; }
  else              { d.className="sync-dot";       t.textContent="Offline"; }
}

/* ── TOAST ── */
function toast(msg, type="ok"){
  const el=$("toast");
  el.textContent=msg; el.className="toast show "+type;
  setTimeout(()=>el.className="toast", 2700);
}

/* ── EYE TOGGLE (generic) ── */
window.toggleEye = function(id){
  const el=$(id); el.type = el.type==="password" ? "text" : "password";
};

/* ── PIN AUTO-ADVANCE ── */
function wirePins(prefix, onDone){
  [0,1,2,3].forEach(i=>{
    const b=$(prefix+i);
    b.addEventListener("input",()=>{
      b.value = b.value.replace(/\D/,"").slice(-1);
      if(b.value && i<3) $(prefix+(i+1)).focus();
      if(i===3 && b.value && onDone) onDone();
    });
    b.addEventListener("keydown",e=>{
      if(e.key==="Backspace" && !b.value && i>0) $(prefix+(i-1)).focus();
    });
  });
}
wirePins("lp", ()=>{ if(pin("lp").length===4) doLogin(); });
wirePins("sp");
wirePins("cp");

/* ── TAB SWITCH ── */
window.switchTab = function(mode){
  $("panelSignin").style.display = mode==="signin" ? "block" : "none";
  $("panelSetup").style.display  = mode==="setup"  ? "block" : "none";
  $("tabSignin").className = "tab"+(mode==="signin"?" active":"");
  $("tabSetup").className  = "tab"+(mode==="setup" ?" active":"");
  $("authHint").style.display = mode==="signin" ? "" : "none";
  $("loginErr").textContent = "";
  $("setupErr").textContent = "";
};

/* ── FIRST TIME SETUP ── */
window.doSetup = async function(){
  const uname = $("suUser").value.trim();
  const p = pin("sp"), c = pin("cp");
  const err = $("setupErr");
  if(!uname){ err.textContent="Please enter a username."; return; }
  if(p.length!==4){ err.textContent="Enter a full 4-digit PIN."; return; }
  if(p!==c){ err.textContent="PINs don't match. Try again."; clrP("cp"); $("cp0").focus(); return; }

  const ref  = doc(db,"users",uname.toLowerCase());
  const snap = await getDoc(ref);
  if(snap.exists()){ err.textContent="Username taken. Try signing in."; return; }

  await setDoc(ref,{ username:uname, pin:p, createdAt:serverTimestamp() });
  clrP("sp"); clrP("cp");
  toast("Vault created! Sign in now.","ok");
  switchTab("signin");
  $("liUser").value = uname;
  $("lp0").focus();
};

/* ── LOGIN ── */
window.doLogin = async function(){
  const uname = $("liUser").value.trim();
  const p     = pin("lp");
  const err   = $("loginErr");
  if(!uname){ err.textContent="Enter your username."; return; }
  if(p.length!==4){ err.textContent="Enter your 4-digit PIN."; return; }

  const ref  = doc(db,"users",uname.toLowerCase());
  const snap = await getDoc(ref);
  if(!snap.exists()){ err.textContent="Username not found. Use First Time Setup."; clrP("lp"); return; }
  if(snap.data().pin !== p){ err.textContent="Wrong PIN. Try again."; clrP("lp"); $("lp0").focus(); return; }

  user = { id:uname.toLowerCase(), name:snap.data().username };
  err.textContent="";
  clrP("lp");
  enterApp();
};

/* ── LOGOUT ── */
window.doLogout = function(){
  if(unsub) unsub();
  user=null; items=[];
  $("appScreen").className="screen";
  $("loginScreen").className="screen active";
  $("liUser").value="";
  switchTab("signin");
};

/* ── ENTER APP ── */
function enterApp(){
  $("loginScreen").className="screen";
  $("appScreen").className="screen active";
  $("hdrUser").textContent = user.name;
  $("bulkInfo").textContent = "Select accounts below to update their passwords";
  sync("busy");

  const col = collection(db,"users",user.id,"passwords");
  if(unsub) unsub();
  unsub = onSnapshot(col, async snap=>{
    items=[];
    snap.forEach(d=>items.push({id:d.id,...d.data()}));
    items.sort((a,b)=>(a.name||"").localeCompare(b.name||""));
    sync("ok");
    if(snap.empty){ for(const def of DEFAULTS) await addDoc(col,{...def,createdAt:serverTimestamp()}); }
    else renderList();
  }, ()=>sync("offline"));
}

/* ── RENDER ── */
function renderList(){
  const el=$("itemsList");
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🗂️</div>No accounts yet.<br>Tap <b>+ Add</b> to get started.</div>`;
    return;
  }
  el.innerHTML=items.map(it=>`
    <div class="item-card${it._sel?" selected":""}${it._upd?" updated":""}" id="card-${it.id}">
      <input type="checkbox" class="item-cb" ${it._sel?"checked":""}
        onchange="toggleSel('${it.id}',this.checked)">
      <div class="item-icon" style="background:${ICON_BG[it.icon]||"#1a1a2a"}">${it.icon||"🔐"}</div>
      <div class="item-info">
        <div class="item-name">${esc(it.name)}</div>
        <div class="item-user">${it.username?esc(it.username):"<span style='color:var(--muted);font-size:11px'>no username</span>"}</div>
      </div>
      <div class="item-actions">
        <button class="icon-btn" title="View & Copy" onclick="openReveal('${it.id}')">🔍</button>
        <button class="icon-btn" title="Edit"        onclick="openEdit('${it.id}')">✏️</button>
        <button class="icon-btn" title="Delete"      onclick="delItem('${it.id}')">🗑️</button>
      </div>
    </div>
  `).join("");
  updateBulkInfo();
}

/* ── SELECTION ── */
window.toggleSel = function(id, checked){
  const it=items.find(i=>i.id===id);
  if(it) it._sel=checked;
  const c=$("card-"+id);
  if(c) c.className="item-card"+(checked?" selected":"")+(it?._upd?" updated":"");
  updateBulkInfo();
};
function updateBulkInfo(){
  const n=items.filter(i=>i._sel).length;
  $("bulkInfo").textContent = n===0
    ? "Select accounts below to update their passwords"
    : `${n} account${n>1?"s":""} selected — new password will apply to these only`;
}

/* ── BULK APPLY ── */
window.applyBulk = async function(){
  const pw=$("bulkPw").value;
  const sel=items.filter(i=>i._sel);
  if(!pw)  { toast("Enter a new password first","err"); return; }
  if(!sel.length){ toast("Select at least one account","err"); return; }
  sync("busy");
  const col=collection(db,"users",user.id,"passwords");
  await Promise.all(sel.map(it=>updateDoc(doc(col,it.id),{password:pw,updatedAt:serverTimestamp()})));
  sel.forEach(it=>{ it._sel=false; it._upd=true; setTimeout(()=>{ it._upd=false; },3000); });
  $("bulkPw").value="";
  toast(`Updated ${sel.length} account${sel.length>1?"s":""}`, "ok");
};

/* ── REVEAL PANEL ── */
window.openReveal = function(id){
  revealItem = items.find(i=>i.id===id);
  if(!revealItem) return;
  pwVisible = false;
  $("rvName").textContent = revealItem.name;
  $("rvUser").textContent = revealItem.username ? "Username: "+revealItem.username : "";
  $("rvPw").textContent   = revealItem.password ? "••••••••" : "(no password saved)";
  $("rvEyeBtn").textContent = "👁";
  $("sheetOverlay").className="sheet-overlay show";
  $("revealSheet").className="reveal-sheet show";
};
window.closeReveal = function(){
  $("sheetOverlay").className="sheet-overlay";
  $("revealSheet").className="reveal-sheet";
  revealItem=null; pwVisible=false;
};
window.toggleRevealEye = function(){
  if(!revealItem?.password) return;
  pwVisible = !pwVisible;
  $("rvPw").textContent     = pwVisible ? revealItem.password : "••••••••";
  $("rvEyeBtn").textContent = pwVisible ? "🙈" : "👁";
};
window.copyReveal = function(){
  if(!revealItem?.password){ toast("No password saved","err"); return; }
  navigator.clipboard.writeText(revealItem.password)
    .then(()=>{ toast("Copied: "+revealItem.name,"ok"); closeReveal(); });
};

/* ── ADD / EDIT MODAL ── */
window.openAdd = function(){
  editId=null; selEmoji="🔐";
  $("modalTitle").textContent="Add Account";
  $("mName").value=""; $("mUser").value=""; $("mPw").value="";
  buildEmoji();
  $("modalOverlay").className="modal-overlay show";
  setTimeout(()=>$("mName").focus(),300);
};
window.openEdit = function(id){
  const it=items.find(i=>i.id===id); if(!it) return;
  editId=id; selEmoji=it.icon||"🔐";
  $("modalTitle").textContent="Edit Account";
  $("mName").value=it.name||"";
  $("mUser").value=it.username||"";
  $("mPw").value=it.password||"";
  buildEmoji();
  $("modalOverlay").className="modal-overlay show";
};
window.closeModal = function(){ $("modalOverlay").className="modal-overlay"; };
window.saveItem   = async function(){
  const name=$("mName").value.trim();
  if(!name){ toast("Account name is required","err"); return; }
  const data={ name, username:$("mUser").value.trim(), password:$("mPw").value, icon:selEmoji, updatedAt:serverTimestamp() };
  sync("busy");
  const col=collection(db,"users",user.id,"passwords");
  if(editId) await updateDoc(doc(col,editId),data);
  else       await addDoc(col,{...data,createdAt:serverTimestamp()});
  closeModal();
  toast(editId?"Updated ✓":"Account added ✓","ok");
};
window.delItem = async function(id){
  const it=items.find(i=>i.id===id);
  if(!confirm(`Delete "${it?.name}"?`)) return;
  sync("busy");
  await deleteDoc(doc(collection(db,"users",user.id,"passwords"),id));
  toast("Deleted","ok");
};

/* ── EMOJI GRID ── */
function buildEmoji(){
  $("emojiGrid").innerHTML=EMOJIS.map(e=>
    `<div class="emoji-opt${e===selEmoji?" picked":""}" onclick="pickEmoji('${e}')">${e}</div>`
  ).join("");
}
window.pickEmoji = function(e){
  selEmoji=e;
  document.querySelectorAll(".emoji-opt").forEach(el=>el.classList.toggle("picked",el.textContent===e));
};

/* ── CLOSE MODAL ON BACKDROP ── */
$("modalOverlay").addEventListener("click",function(e){ if(e.target===this) closeModal(); });
</script>
</body>
</html>
